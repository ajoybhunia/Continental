version: "3.9"

services:
  nginx_proxy:
    ports:
      - "3000:80"
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
    networks:
      - backend

  server:
    build: .
    deploy:
      replicas: 5
    environment:
      TODO_MONGO_URI: mongodb://mongo:27017/continental
    depends_on:
      - mongo
    networks:
      - backend

  mongo:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - backend

volumes:
  mongo_data:

networks:
  backend:
    driver: bridge